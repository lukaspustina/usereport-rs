[[rule]]
id = "dmesg.oom_kill"
when = "dmesg.oom_count > 0"
severity = "crit"
summary = "Out-of-memory killer fired since the last log rotate."
evidence = ["dmesg.oom_count"]
suggest = ["dmesg -T | grep -i 'killed process'", "journalctl -k --since -1h"]

[[rule]]
id = "dmesg.blocked_tasks"
when = "dmesg.blocked_task_count > 0"
severity = "warn"
summary = "Kernel reported tasks blocked > 120s."
evidence = ["dmesg.blocked_task_count"]
suggest = ["dmesg -T | grep blocked", "ps -eo state,pid,cmd | awk '$1 ~ /D/'"]

[[rule]]
id = "dmesg.fs_errors"
when = "dmesg.fs_error_count > 0"
severity = "crit"
summary = "Filesystem errors detected in kernel log."
evidence = ["dmesg.fs_error_count"]
suggest = ["dmesg -T | grep -Ei 'ext4|xfs.*error'", "smartctl --scan"]
