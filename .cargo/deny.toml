[advisories]
version = 2
unmaintained = "workspace"
yanked = "deny"

[licenses]
# Suppress warnings for allowlist entries not used by any current dependency.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDDL-1.0",  # inferno 0.12.6 (flamegraph SVG generation)
]

[bans]
multiple-versions = "warn"
# getrandom 0.4 pulls in both wasip2 and wasip3 crates which each bring a
# different wit-bindgen version; these duplicates are transitive and outside
# our control.
skip = [
    { name = "wit-bindgen", version = "0.46" },
    { name = "wit-bindgen", version = "0.51" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
