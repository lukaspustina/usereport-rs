[[rule]]
id = "disk.utilization_saturated"
when = "disk.util_pct > 90"
severity = "warn"
summary = "Disk %util above 90% — block device saturated."
evidence = ["disk.util_pct"]
suggest = ["iostat -x 1 5", "iotop -ao", "biolatency 1 5"]

[[rule]]
id = "disk.await_elevated"
when = "disk.await_ms > 100"
severity = "warn"
summary = "Disk request latency above 100 ms."
evidence = ["disk.await_ms"]
suggest = ["iostat -x 1 5", "biolatency 1 5"]
