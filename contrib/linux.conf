[defaults]
timeout = 1
# repetitions = 1
# max_parallel_commands = 64
# baseline_rolling_n = 24

[hostinfo]
commands = ["uptime", "dmesg"]

# ── Profiles ─────────────────────────────────────────────────────────────────

[[profile]]
name = "default"
commands = ["uptime", "sar_cpu", "sar_q", "free", "vmstat", "iostat", "df", "sar_dev", "sar_tcp", "dmesg"]
description = "Balanced USE coverage across all four resource classes. Good starting point for any incident: CPU utilization + run-queue, memory pressure, disk throughput, and network error rates."

[[profile.followup]]
finding = "cpu.iowait_elevated"
recommend = "io"
reason = "elevated iowait — inspect disk utilization and queue depth"

[[profile.followup]]
finding = "mem.pressure"
recommend = "mem"
reason = "memory pressure detected — full memory inspection"

[[profile.followup]]
finding = "net.retransmit_elevated"
recommend = "net"
reason = "TCP retransmits elevated — full network investigation"

[[profile]]
name = "cpu"
commands = ["uptime", "sar_cpu", "sar_q", "pidstat", "vmstat", "dmesg"]
description = "Full CPU USE: per-core utilization (sar_cpu), run-queue + load saturation (sar_q, vmstat r), per-process breakdown (pidstat), and kernel error events — MCE, thermal throttle (dmesg)."

[[profile.followup]]
finding = "cpu.iowait_elevated"
recommend = "io"
reason = "high iowait — disk may be the real bottleneck, not CPU"

[[profile.followup]]
finding = "mem.pressure"
recommend = "mem"
reason = "memory pressure causes page faults that inflate CPU usage"

[[profile]]
name = "mem"
commands = ["uptime", "free", "meminfo", "vmstat", "swapon", "slabinfo", "pidstat", "dmesg"]
description = "Full memory USE: RAM utilization (free, meminfo), swap and page-fault saturation (vmstat si/so, swapon), kernel slab accounting (slabinfo), per-process consumption (pidstat), and OOM kills (dmesg)."

[[profile.followup]]
finding = "dmesg.oom_kill"
recommend = "cpu"
reason = "OOM kills often correlate with CPU thrash — check run-queue"

[[profile]]
name = "net"
commands = ["uptime", "sar_dev", "sar_tcp", "sar_edev", "ss_all_tcp", "socket_stat", "tcp_mem", "dmesg"]
description = "Full network USE: interface throughput (sar_dev), TCP segment rates + retransmits (sar_tcp), socket recv-q/send-q backlog (ss_all_tcp, socket_stat), TCP buffer limits (tcp_mem), interface errors and drops (sar_edev), and kernel NIC events (dmesg)."

[[profile.followup]]
finding = "net.time_wait_high"
recommend = "net"
reason = "TIME_WAIT accumulation — inspect tcp_mem limits and port range"

[[profile]]
name = "io"
commands = ["uptime", "iostat", "df", "vmstat", "pidstat_io", "dmesg"]
description = "Full disk I/O USE: per-device throughput and utilization (iostat %util), queue depth and latency saturation (iostat avgqu-sz/await, vmstat wa/b), filesystem capacity (df), per-process I/O (pidstat_io), and kernel disk error events (dmesg)."

[[profile.followup]]
finding = "cpu.iowait_elevated"
recommend = "mem"
reason = "heavy swap I/O can cause iowait — check memory pressure too"

[[profile]]
name = "total"
commands = ["uptime", "sar_cpu", "sar_q", "pidstat", "pidstat_io", "free", "meminfo", "vmstat", "swapon", "slabinfo", "iostat", "df", "sar_dev", "sar_tcp", "sar_edev", "ss_all_tcp", "socket_stat", "tcp_mem", "dmesg"]
description = "Everything. All USE dimensions across CPU, memory, disk, and network. Use for a comprehensive baseline capture or when the symptom is unknown."

# ── Commands ──────────────────────────────────────────────────────────────────

[[command]]
name = "dmesg"
title = "Last kernel messages"
description = "Recent kernel log messages including hardware errors, OOM kills, disk failures, and driver warnings"
command = '''sh -c "dmesg -T | tail -20"'''
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/dmesg.1.html" },
]

[[command.extract]]
pattern = 'Out of memory:'
signal_id = "dmesg.oom_count"
unit = "count"
aggregate = "count"

[[command]]
name = "uptime"
title = "Current Load"
description = "Current load and uptime"
command = "uptime"
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/uptime.1.html" },
]

[[command]]
name = "sar_cpu"
title = "CPU statistics per core"
description = "Per-CPU and aggregate CPU usage (usr, sys, iowait, steal, idle)"
command = "sar -u -P ALL 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
what_to_look_for = "High %iowait means disk is a bottleneck. High %steal means CPU is being stolen by the hypervisor. High %sys relative to %usr can indicate kernel pressure. Idle near 0% means CPU is saturated."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/sar.1.html" },
]
[command.use_dimension]
resource = "cpu"
aspect = "utilization"

[[command]]
name = "sar_q"
title = "CPU run-queue saturation"
description = "Run-queue length and load averages — runq-sz > CPU count indicates CPU saturation"
command = "sar -q 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
what_to_look_for = "runq-sz consistently above CPU count means tasks are waiting for the CPU. ldavg-1 spiking above CPU count indicates transient saturation."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/sar.1.html" },
]
[command.use_dimension]
resource = "cpu"
aspect = "saturation"

[[command]]
name = "pidstat"
title = "Task / process CPU statistics"
description = "Show CPU statistics per running task / process"
command = "pidstat -l 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/pidstat.1.html" },
]
[command.use_dimension]
resource = "cpu"
aspect = "utilization"

[[command]]
name = "pidstat_io"
title = "Per-process disk I/O"
description = "Per-process disk I/O statistics: read and write throughput, I/O delay. Identifies which processes are driving disk activity."
command = "pidstat -d 1 3"
timeout = 4
install_hint = "apt-get install sysstat"
what_to_look_for = "High kB_rd/s or kB_wr/s on a single process explains iostat utilization. iodelay > 0 means the process is blocked waiting for I/O — directly measurable saturation. Combine with iostat await to confirm the device is the bottleneck."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/pidstat.1.html" },
]
[command.use_dimension]
resource = "disk"
aspect = "saturation"

[[command]]
name = "vmstat"
title = "Virtual Memory statistics"
description = "Summary of virtual memory, CPU scheduling, block I/O, swap, and system activity across all CPUs"
command = "vmstat 1 5"
timeout = 5
what_to_look_for = "b column > 0 means processes blocked on I/O. wa (CPU wait) > 5% indicates I/O pressure. si/so > 0 means active swapping — a red flag. r > CPU count means CPU saturation."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man8/vmstat.8.html" },
]
[command.use_dimension]
resource = "cpu"
aspect = "saturation"

[[command.extract]]
pattern = '^\s*(?:\d+\s+){9}\d+\s+(?P<val>\d+)'
signal_id = "vmstat.wa_pct"
unit = "pct"
aggregate = "max"

[[command]]
name = "free"
title = "Virtual memory usage"
description = "Physical memory (RAM) and swap usage in MiB (-m). 'available' is the estimate of how much memory can be started without swapping; buffers/page cache are reclaimable."
command = "free -m"
timeout = 1
what_to_look_for = "Low 'available' (not 'free') is the true low-memory indicator. Swap 'used' > 0 means the system has swapped; growing swap used over time is a warning sign."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/free.1.html" },
]
[command.use_dimension]
resource = "memory"
aspect = "utilization"

[[command]]
name = "iostat"
title = "Block device I/O statistics"
description = "Current I/O statistics per block device in KB"
command = "iostat -x 1 5"
install_hint = "apt-get install sysstat"
timeout = 5
what_to_look_for = "%util near 100% means the device is saturated. await > 10ms for SSDs or > 50ms for HDDs indicates slow I/O. avgqu-sz > 1 means requests are queuing. r_await and w_await help distinguish read vs write pressure."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/iostat.1.html" },
]
[command.use_dimension]
resource = "disk"
aspect = "utilization"

[[command]]
name = "sar_dev"
title = "Network device I/O statistics"
description = "Current I/O statistics per network device in KB"
command = "sar -n DEV 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/sar.1.html" },
]
[command.use_dimension]
resource = "network"
aspect = "utilization"

[[command]]
name = "sar_tcp"
title = "TCP traffic and TCP error statistics"
description = "Current statistics for TCP traffic and errors"
command = "sar -n TCP,ETCP 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/sar.1.html" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

[[command]]
name = "sar_edev"
title = "Network interface error statistics"
description = "Error rates per interface: rxerr/s, txerr/s, rxdrop/s, txdrop/s, rxfifo/s, txfifo/s"
command = "sar -n EDEV 1 5"
timeout = 6
install_hint = "apt-get install sysstat"
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/sar.1.html" },
]
[command.use_dimension]
resource = "network"
aspect = "errors"

[[command]]
name = "df"
title = "Disk capacity"
description = "Filesystem capacity utilization (USE: storage capacity utilization)"
command = "df -h"
timeout = 1
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man1/df.1.html" },
]
[command.use_dimension]
resource = "disk"
aspect = "utilization"

[[command]]
name = "swapon"
title = "Swap capacity"
description = "Active swap devices, size, and current usage"
command = "swapon -s"
timeout = 1
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man8/swapon.8.html" },
]
[command.use_dimension]
resource = "memory"
aspect = "saturation"

[[command]]
name = "ss_all_tcp"
title = "Show all TCP sockets"
description = '''TCP sockets via ss(8)
Recv-Q: Bytes not copied by the user program connected to this socket
Send-Q: Bytes not acknowledged by the remote host'''
command = "ss -tanp"
timeout = 1
what_to_look_for = "Large Recv-Q values mean the application is not draining its socket buffers — process may be stuck or overloaded. Large Send-Q means the remote host is not acknowledging — possible network congestion or remote slowness."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man8/ss.8.html" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

[[command]]
name = "meminfo"
title = "Virtual memory details"
command = "cat /proc/meminfo"
[command.use_dimension]
resource = "memory"
aspect = "utilization"

[[command]]
name = "slabinfo"
title = "Kernel slab memory details"
description = "Kernel slab allocator cache statistics: active/total objects and slabs per cache type. High object counts in a single cache (e.g. dentry, inode_cache) can indicate a slab memory leak."
command = "cat /proc/slabinfo"
[command.use_dimension]
resource = "memory"
aspect = "utilization"

[[command]]
name = "socket_stat"
title = "Show network socket statistics"
description = '''sockets: total sockets currently in-use across all protocols
TCP: orphan sockets (connection closing with no owner process), time-wait sockets (completed connections waiting for delayed packets), and memory usage in pages
UDP: sockets in use and memory usage in pages
UDPLITE: lightweight UDP variant for loss-tolerant applications (RFC 3828)
RAW: raw protocol sockets currently in use
FRAG: IP fragment reassembly queue: in-use slots and memory in pages
'''
command = "cat /proc/net/sockstat"
what_to_look_for = "High tw (time-wait) count is normal under heavy load but excessive values (> 100k) can exhaust ephemeral ports. Orphan count > 0 indicates half-closed connections. mem values near system limits signal memory pressure on the TCP stack."
links = [
    { name = "ref1", url = "https://unix.stackexchange.com/questions/419518/how-to-tell-how-much-memory-tcp-buffers-are-actually-using" },
    { name = "rfc793 - TCP, time-wait", url = "https://datatracker.ietf.org/doc/html/rfc793" },
    { name = "udplite", url = "https://man7.org/linux/man-pages/man7/udplite.7.html" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

[[command]]
name = "tcp_mem"
title = "TCP stack memory limits"
description = """vector of 3 integers: [low, pressure, high] in pages (usually 4 KB)

low: TCP doesn't regulate its memory allocation when the number of pages it has allocated globally is below this number
pressure: When the amount of memory allocated by TCP exceeds this number of pages, TCP moderates its memory consumption
high: The maximum number of pages, globally, that TCP will allocate.

vector is shown for total, read, and write buffers"""
command = '''sh -c "grep . /proc/sys/net/ipv4/tcp*mem"'''
what_to_look_for = "If the current value (from /proc/net/sockstat mem field × page size) approaches the 'high' threshold, TCP will start dropping connections. Compare against socket_stat to see current usage."
links = [
    { name = "man", url = "https://man7.org/linux/man-pages/man7/tcp.7.html" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

