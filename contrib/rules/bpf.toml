# BPF tool availability rules.
# One Info finding per tool that is not installed. These rules are only
# loaded when the --bpf flag is active.

[[rule]]
id = "bpf.runqlat.unavailable"
when = "bpf.runqlat.available == false"
severity = "info"
summary = "bpf tool 'runqlat' not found in PATH — run-queue latency histogram unavailable."
evidence = ["bpf.runqlat.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]

