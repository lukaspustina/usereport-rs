# BPF tool availability rules.
# One Info finding per tool that is not installed. These rules are only
# loaded when the --bpf flag is active.

[[rule]]
id = "bpf.runqlat.unavailable"
when = "bpf.runqlat.available == false"
severity = "info"
summary = "bpf tool 'runqlat' not found in PATH — run-queue latency histogram unavailable."
description = "runqlat measures the time threads spend waiting in the CPU run queue before being scheduled. Without it, CPU saturation can only be inferred from vmstat counters rather than measured directly as a latency distribution. Install bcc-tools to enable this diagnostic."
evidence = ["bpf.runqlat.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]

[[rule]]
id = "bpf.biolatency.unavailable"
when = "bpf.biolatency.available == false"
severity = "info"
summary = "bpf tool 'biolatency' not found in PATH — block I/O latency histogram unavailable."
description = "biolatency produces a histogram of block I/O completion latencies, which is the definitive measure of storage responsiveness. Without it, disk health can only be approximated from iostat averages that hide tail latency. Install bcc-tools to enable this diagnostic."
evidence = ["bpf.biolatency.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]

[[rule]]
id = "bpf.tcpretrans.unavailable"
when = "bpf.tcpretrans.available == false"
severity = "info"
summary = "bpf tool 'tcpretrans' not found in PATH — TCP retransmit tracing unavailable."
description = "tcpretrans traces individual TCP retransmit events and reports the source/destination of each, enabling precise attribution of network packet loss. Without it, retransmit rates are only available as aggregate counters from ss or sar. Install bcc-tools to enable this diagnostic."
evidence = ["bpf.tcpretrans.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]

[[rule]]
id = "bpf.execsnoop.unavailable"
when = "bpf.execsnoop.available == false"
severity = "info"
summary = "bpf tool 'execsnoop' not found in PATH — exec event tracing unavailable."
description = "execsnoop traces every exec() syscall system-wide in real time, revealing short-lived processes that are invisible to periodic sampling tools like top or ps. Without it, transient process storms or unexpected child process spawning will go undetected. Install bcc-tools to enable this diagnostic."
evidence = ["bpf.execsnoop.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]

[[rule]]
id = "bpf.cachestat.unavailable"
when = "bpf.cachestat.available == false"
severity = "info"
summary = "bpf tool 'cachestat' not found in PATH — page cache hit-rate tracing unavailable."
description = "cachestat reports the Linux page cache hit and miss rates in real time, showing whether the working set fits in memory. Without it, cache effectiveness can only be inferred indirectly from vmstat or /proc/meminfo. Install bcc-tools to enable this diagnostic."
evidence = ["bpf.cachestat.available"]
suggest = ["apt-get install bpfcc-tools", "yum install bcc-tools"]
