# PostgreSQL workload rule pack.
# Fires on signals emitted by a postgres-aware collector or crafted fixtures.
# Thresholds are conservative defaults; tune via rules.d/ overrides.

[[rule]]
id = "pg.connection_saturation"
when = "pg.active_connections > 400"
severity = "warn"
summary = "PostgreSQL active connections high — connection pool may be saturated."
evidence = ["pg.active_connections"]
suggest = ["psql -c 'SELECT count(*), state FROM pg_stat_activity GROUP BY state;'", "pg_activity"]

[[rule]]
id = "pg.cache_hit_low"
when = "pg.cache_hit_pct < 90"
severity = "warn"
summary = "PostgreSQL shared-buffer cache hit rate below 90% — working set may not fit in shared_buffers."
evidence = ["pg.cache_hit_pct"]
suggest = ["psql -c 'SELECT sum(blks_hit)*100.0/(sum(blks_hit)+sum(blks_read)) FROM pg_stat_database;'", "consider increasing shared_buffers"]

[[rule]]
id = "pg.lock_waits_nonzero"
when = "pg.lock_waits > 0"
severity = "warn"
summary = "PostgreSQL lock waits detected — contention on shared rows or tables."
evidence = ["pg.lock_waits"]
suggest = ["psql -c 'SELECT * FROM pg_stat_activity WHERE wait_event_type = ''Lock'';'", "psql -c 'SELECT * FROM pg_locks WHERE granted = false;'"]

[[rule]]
id = "pg.replication_lag_elevated"
when = "pg.replication_lag_bytes > 52428800"
severity = "crit"
summary = "PostgreSQL replication lag exceeds 50 MiB — standby is falling behind."
evidence = ["pg.replication_lag_bytes"]
suggest = ["psql -c 'SELECT * FROM pg_stat_replication;'"]
