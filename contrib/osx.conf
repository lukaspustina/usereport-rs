[defaults]
timeout = 1
# repetitions = 1
# max_parallel_commands = 64
# baseline_rolling_n = 24

[hostinfo]
commands = ["uname", "sw_vers"]

# ── Profiles ─────────────────────────────────────────────────────────────────

[[profile]]
name = "default"
commands = ["uptime", "iostat", "top_cpu", "vm_stat", "memory_pressure", "df", "netstat_tcp_s", "netstat_i"]
description = "Balanced USE coverage across all four resource classes. CPU utilization (iostat cpu columns, top_cpu), memory utilization and saturation (vm_stat, memory_pressure), disk throughput (iostat), and network saturation + error rates (netstat_tcp_s, netstat_i)."

[[profile.followup]]
finding = "mem.pressure"
recommend = "mem"
reason = "memory pressure detected — full memory inspection"

[[profile.followup]]
finding = "net.retransmit_elevated"
recommend = "net"
reason = "TCP retransmits elevated — full network investigation"

[[profile]]
name = "cpu"
commands = ["uptime", "iostat", "top_cpu", "vm_stat"]
description = "Full CPU USE: utilization from iostat (us/sy/id columns) and top_cpu per-process breakdown, load-average saturation from uptime, and memory-induced CPU pressure from vm_stat (active paging slows the CPU)."

[[profile.followup]]
finding = "mem.pressure"
recommend = "mem"
reason = "memory pressure causes page faults that inflate CPU usage"

[[profile]]
name = "mem"
commands = ["uptime", "vm_stat", "memory_pressure", "swap_usage", "top_mem"]
description = "Full memory USE: page-level utilization (vm_stat), kernel pressure level (memory_pressure), swap saturation (swap_usage), and per-process memory consumption (top_mem)."

[[profile]]
name = "net"
commands = ["uptime", "nettop_snapshot", "netstat_an", "netstat_tcp_s", "netstat_i"]
description = "Full network USE: per-process throughput (nettop_snapshot), socket-state saturation including TIME_WAIT and recv-q backlog (netstat_an), TCP segment rates and retransmits (netstat_tcp_s), and interface error counters (netstat_i)."

[[profile]]
name = "io"
commands = ["uptime", "iostat", "df", "vm_stat"]
description = "Full disk I/O USE: per-device throughput and tps utilization (iostat), filesystem capacity (df), and page-in/page-out activity as an indirect saturation signal (vm_stat). Note: macOS does not expose per-device queue depth or await without root."

[[profile]]
name = "total"
commands = ["uptime", "vm_stat", "memory_pressure", "swap_usage", "iostat", "df", "top_cpu", "top_mem", "nettop_snapshot", "netstat_an", "netstat_tcp_s", "netstat_i"]
description = "Everything. All USE dimensions across CPU, memory, disk, and network. Use for a comprehensive baseline capture or when the symptom is unknown."

# ── Commands ──────────────────────────────────────────────────────────────────

[[command]]
name = "uname"
title = "Host kernel"
description = "Kernel name, version, and architecture"
command = "uname -a"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/uname/" },
]

[[command]]
name = "sw_vers"
title = "macOS release"
description = "Operating system release information"
command = "sw_vers"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/sw_vers/" },
]

[[command]]
name = "uptime"
title = "Current Load"
description = "Current load and uptime"
command = "uptime"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/uptime/" },
]

[[command]]
name = "vm_stat"
title = "Virtual Memory statistics"
description = "Current memory usage and statistics in pages (4 KB on Intel, 16 KB on Apple Silicon). Shows free, active, inactive, speculative, wired, and compressed pages."
command = "vm_stat -c 5 1"
timeout = 5
what_to_look_for = "Pages free near zero means the system is under memory pressure. High 'Pages swapped out' or 'Pageins/Pageouts' indicates active swapping. 'Pages wired down' is non-reclaimable kernel memory — a leak shows as steady growth."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/vm_stat/" },
]
[command.use_dimension]
resource = "memory"
aspect = "utilization"

[[command]]
name = "iostat"
title = "Kernel I/O statistics"
description = "Current I/O statistics per disk device and CPU summary (us/sy/id columns). Captures both disk utilization and CPU breakdown in a single sample."
command = "iostat -c 5 -K"
timeout = 5
what_to_look_for = "High tps with large KB/t shows throughput-bound workload. CPU idle near 0% alongside low tps indicates CPU saturation unrelated to disk. Compare disk util against vm_stat pageins/pageouts to distinguish disk I/O from swap pressure."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/8/iostat/" },
]
[command.use_dimension]
resource = "disk"
aspect = "utilization"

[[command]]
name = "memory_pressure"
title = "Memory pressure"
description = "Kernel-reported memory pressure level and free pages"
command = "memory_pressure -Q"
timeout = 2
what_to_look_for = "WARNING or CRITICAL pressure means the system is actively compressing or swapping. 'System-wide memory free percentage' below 15% is a warning sign. Compare with vm_stat Pages free."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/memory_pressure/" },
]
[command.use_dimension]
resource = "memory"
aspect = "saturation"

[[command]]
name = "swap_usage"
title = "Swap usage"
description = "Total, used, and free swap (sysctl vm.swapusage)"
command = "sysctl vm.swapusage"
timeout = 1
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/8/sysctl/" },
]
[command.use_dimension]
resource = "memory"
aspect = "saturation"

[[command]]
name = "top_mem"
title = "Top processes by memory"
description = "Snapshot of processes ordered by resident memory"
command = "top -l 1 -n 10 -o mem -stats pid,command,mem,cpu,state"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/top/" },
]
[command.use_dimension]
resource = "memory"
aspect = "utilization"

[[command]]
name = "df"
title = "Disk capacity"
description = "Filesystem capacity utilization (USE: storage capacity utilization)"
command = "df -h"
timeout = 1
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/df/" },
]
[command.use_dimension]
resource = "disk"
aspect = "utilization"

[[command]]
name = "top_cpu"
title = "Top processes by CPU"
description = "Snapshot of processes ordered by CPU usage"
command = "top -l 1 -n 10 -o cpu -stats pid,command,cpu,mem,state"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/top/" },
]
[command.use_dimension]
resource = "cpu"
aspect = "utilization"

[[command]]
name = "netstat_an"
title = "Active network connections"
description = "All active sockets, all protocols, no name resolution"
command = "netstat -an"
timeout = 2
what_to_look_for = "Large number of TIME_WAIT sockets indicates high connection turnover — may exhaust ephemeral ports. CLOSE_WAIT sockets lingering means the application is not closing connections. Recv-Q buildup means the application is not reading fast enough."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

[[command]]
name = "netstat_tcp_s"
title = "TCP protocol statistics"
description = "Cumulative TCP statistics since boot: segments sent/received, retransmits, connection failures"
command = "netstat -s -p tcp"
timeout = 2
what_to_look_for = "Rising retransmit count between runs indicates congestion or packet loss — retransmits are the primary TCP saturation signal on macOS. High connection failures suggest port exhaustion or remote refusals. Compare two snapshots to isolate rate of change."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]
[command.use_dimension]
resource = "network"
aspect = "saturation"

[[command]]
name = "netstat_i"
title = "Network interface error statistics"
description = "Per-interface packet counts, input errors (Ierrs), output errors (Oerrs), and collisions"
command = "netstat -i"
timeout = 2
what_to_look_for = "Ierrs or Oerrs incrementing means the interface is dropping packets — likely a hardware or driver issue. Coll (collisions) > 0 on a modern switch indicates duplex mismatch."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]
[command.use_dimension]
resource = "network"
aspect = "errors"

[[command]]
name = "nettop_snapshot"
title = "Per-process network usage"
description = "Single-shot snapshot of per-process network throughput"
command = "nettop -P -L 1 -n"
timeout = 5
what_to_look_for = "Identify which process is consuming most bandwidth. Unexpected high throughput from a background process may indicate runaway sync, logging, or data exfiltration."
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/nettop/" },
]
[command.use_dimension]
resource = "network"
aspect = "utilization"

