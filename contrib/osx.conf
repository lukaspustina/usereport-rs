[defaults]
timeout = 1

[hostinfo]
commands = ["uname", "sw_vers"]

[[profile]]
name = "default"
commands = ["uptime", "vm_stat", "iostat", "df", "top_cpu"]
description = "Gives a general overview of the system"

[[profile]]
name = "mem"
commands = ["uptime", "vm_stat", "memory_pressure", "swap_usage", "top_mem"]
description = "Inspects virtual memory resources"

[[profile]]
name = "net"
commands = ["uptime", "netstat_an", "netstat_tcp_s", "netstat_i", "nettop_snapshot"]
description = "Inspects network related resources"

[[command]]
name = "uname"
title = "Host kernel"
description = "Kernel name, version, and architecture"
command = "uname -a"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/uname/" },
]

[[command]]
name = "sw_vers"
title = "macOS release"
description = "Operating system release information"
command = "sw_vers"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/sw_vers/" },
]

[[command]]
name = "uptime"
title = "Current Load"
description = "Current load and uptime"
command = "uptime"
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/uptime/" },
]

[[command]]
name = "vm_stat"
title = "Virtual Memory statistics"
description = "Current memory usage and statistics in pages"
command = "vm_stat -c 5 1"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1m/vmstat/" },
]

[[command]]
name = "iostat"
title = "Kernel I/O statistics"
description = "Current I/O statistics per dev in KB"
command = "iostat -c 5 -K"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/8/iostat/" },
]

[[command]]
name = "memory_pressure"
title = "Memory pressure"
description = "Kernel-reported memory pressure level and free pages"
command = "memory_pressure -Q"
timeout = 2
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/memory_pressure/" },
]

[[command]]
name = "swap_usage"
title = "Swap usage"
description = "Total, used, and free swap (sysctl vm.swapusage)"
command = "sysctl vm.swapusage"
timeout = 1
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/8/sysctl/" },
]

[[command]]
name = "top_mem"
title = "Top processes by memory"
description = "Snapshot of processes ordered by resident memory"
command = "top -l 1 -n 10 -o mem -stats pid,command,mem,cpu,state"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/top/" },
]

[[command]]
name = "df"
title = "Disk capacity"
description = "Filesystem capacity utilization (USE: storage capacity utilization)"
command = "df -h"
timeout = 1
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/df/" },
]

[[command]]
name = "top_cpu"
title = "Top processes by CPU"
description = "Snapshot of processes ordered by CPU usage"
command = "top -l 1 -n 10 -o cpu -stats pid,command,cpu,mem,state"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/top/" },
]

[[command]]
name = "netstat_an"
title = "Active network connections"
description = "All active sockets, all protocols, no name resolution"
command = "netstat -an"
timeout = 2
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]

[[command]]
name = "netstat_tcp_s"
title = "TCP protocol statistics"
description = "Cumulative TCP statistics since boot"
command = "netstat -s -p tcp"
timeout = 2
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]

[[command]]
name = "netstat_i"
title = "Network interface error statistics"
description = "Per-interface packet counts, input errors (Ierrs), output errors (Oerrs), and collisions"
command = "netstat -i"
timeout = 2
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/netstat/" },
]

[[command]]
name = "nettop_snapshot"
title = "Per-process network usage"
description = "Single-shot snapshot of per-process network throughput"
command = "nettop -P -L 1 -n"
timeout = 5
links = [
    { name = "man", url = "https://www.unix.com/man-page/osx/1/nettop/" },
]

